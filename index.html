<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --primary-dark: #3730a3;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }

  /* Login screen */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .login-screen h1 {
    font-size: 2.5rem;
    color: white;
    margin-bottom: 8px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .login-screen p {
    color: rgba(255,255,255,0.8);
    margin-bottom: 32px;
    font-size: 1.1rem;
  }
  .login-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    color: var(--text);
    border: none;
    padding: 14px 32px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
  .login-btn svg { width: 20px; height: 20px; }
  .login-error {
    color: #fecaca;
    margin-top: 16px;
    font-size: 0.9rem;
    text-align: center;
    max-width: 320px;
  }

  /* Header */
  .header {
    background: white;

  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
);
const BoxIcon = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
);
const GoogleIcon = () => (
  <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
);

// ── App ──
function App() {
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [authError, setAuthError] = useState("");
  const [firebaseReady, setFirebaseReady] = useState(false);
  const [needsSetup, setNeedsSetup] = useState(false);

  // Data
  const [containers, setContainers] = useState([]);
  const [dataLoading, setDataLoading] = useState(true);

  // UI
  const [searchQuery, setSearchQuery] = useState("");
  const [locationFilter, setLocationFilter] = useState("");
  const [expandedIds, setExpandedIds] = useState(new Set());
  const [toast, setToast] = useState(null);

  // Modals
  const [showAddModal, setShowAddModal] = useState(false);
  const [editContainer, setEditContainer] = useState(null);
  const [moveItem, setMoveItem] = useState(null); // { item, fromContainerId }

  const dbRef = useRef(null);
  const unsubRef = useRef(null);

  // Initialize Firebase
  useEffect(() => {
    if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") {
      setNeedsSetup(true);
      setAuthLoading(false);
      return;
    }
    try {
      const app = firebase.initializeApp(FIREBASE_CONFIG);
      dbRef.current = firebase.firestore();
      setFirebaseReady(true);

      const unsubAuth = firebase.auth().onAuthStateChanged((u) => {
        if (u && ALLOWED_EMAILS.includes(u.email)) {
          setUser(u);
          setAuthError("");
        } else if (u) {
          firebase.auth().signOut();
          setAuthError("Access restricted. Only authorized accounts may sign in.");
          setUser(null);
        } else {
          setUser(null);
        }
        setAuthLoading(false);
      });
      return () => unsubAuth();
    } catch (e) {
      console.error("Firebase init error:", e);
      setNeedsSetup(true);
      setAuthLoading(false);
    }
  }, []);

  // Subscribe to Firestore
  useEffect(() => {
    if (!firebaseReady || !user) return;
    setDataLoading(true);
    const db = dbRef.current;
    const unsub = db.collection("containers").onSnapshot((snap) => {
      const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // Sort: numbered first (ascending), then unnumbered by location
      data.sort((a, b) => {
        if (a.number != null && b.number != null) return a.number - b.number;
        if (a.number != null) return -1;
        if (b.number != null) return 1;
        return (a.location || "").localeCompare(b.location || "");
      });
      setContainers(data);
      setDataLoading(false);
    }, (err) => {
      console.error("Firestore error:", err);
      setDataLoading(false);
    });
    unsubRef.current = unsub;
    return () => unsub();
  }, [firebaseReady, user]);

  // Show toast
  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }, []);

  // Sign in
  const signIn = async () => {
    setAuthError("");
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await firebase.auth().signInWithPopup(provider);
    } catch (e) {
      if (e.code !== "auth/popup-closed-by-user") {
        setAuthError(e.message);
      }
    }
  };

  // Sign out
  const signOut = () => firebase.auth().signOut();

  // ── CRUD operations ──
  const getNextNumber = () => {
    const numbered = containers.filter(c => c.number != null);
    if (numbered.length === 0) return 1;
    return Math.max(...numbered.map(c => c.number)) + 1;
  };

  const addContainer = async (data) => {
    const db = dbRef.current;
    const isUncontained = data.type === "Uncontained";
    await db.collection("containers").add({
      number: isUncontained ? null : getNextNumber(),
      type: data.type,
      location: data.location,
      items: data.items || [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast(isUncontained ? "Items added" : "Container added");
  };

  const updateContainer = async (id, data) => {
    const db = dbRef.current;
    await db.collection("containers").doc(id).update({
      ...data,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  };

  const deleteContainer = async (id) => {
    if (!window.confirm("Delete this container and all its items?")) return;
    const db = dbRef.current;
    await db.collection("containers").doc(id).delete();
    showToast("Container deleted");
  };

  const addItemToContainer = async (containerId, item) => {
    const container = containers.find(c => c.id === containerId);
    if (!container) return;
    const newItems = [...container.items, item];
    await updateContainer(containerId, { items: newItems });
    showToast("Item added");
  };

  const removeItemFromContainer = async (containerId, itemIndex) => {
    const container = containers.find(c => c.id === containerId);
    if (!container) return;
    const newItems = container.items.filter((_, i) => i !== itemIndex);
    await updateContainer(containerId, { items: newItems });
    showToast("Item removed");
  };

  const moveItemToContainer = async (item, fromContainerId, toContainerId) => {
    const from = containers.find(c => c.id === fromContainerId);
    const to = containers.find(c => c.id === toContainerId);
    if (!from || !to) return;

    const fromItems = from.items.filter(i => i !== item);
    const toItems = [...to.items, item];

    const db = dbRef.current;
    const batch = db.batch();
    batch.update(db.collection("containers").doc(fromContainerId), {
      items: fromItems,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    batch.update(db.collection("containers").doc(toContainerId), {
      items: toItems,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await batch.commit();
    showToast(`Moved to #${to.number}`);
    setMoveItem(null);
  };

  const copyLabel = (container) => {
    const lines = [];
    if (container.number != null) lines.push(`#${container.number}`);
    lines.push(container.type, container.location, "", ...container.items);
    navigator.clipboard.writeText(lines.join("\n"));
    showToast("Label copied to clipboard");
  };

  // Seed data
  const seedData = async () => {
    const db = dbRef.current;
    const batch = db.batch();
    SEED_DATA.forEach((c) => {
      const ref = db.collection("containers").doc();
      batch.set(ref, {
        ...c,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
    showToast("Loaded outdoor storage data");
  };

  // ── Fuzzy search ──
  const allItemsForSearch = useMemo(() => {
    return containers.flatMap(c =>
      c.items.map((item, idx) => ({
        item,
        itemIndex: idx,
        containerId: c.id,
        containerNumber: c.number,
        containerLocation: c.location,
        containerType: c.type
      }))
    );
  }, [containers]);

  const fuse = useMemo(() => {
    return new Fuse(allItemsForSearch, {
      keys: ["item"],
      threshold: 0.35,
      ignoreLocation: true,
      minMatchCharLength: 2
    });
  }, [allItemsForSearch]);

  const fuseLoc = useMemo(() => {
    return new Fuse(containers, {
      keys: ["location", "type"],
      threshold: 0.35,
      ignoreLocation: true,
      minMatchCharLength: 2
    });
  }, [containers]);

  const searchResults = useMemo(() => {
    if (!searchQuery.trim()) return null;
    const itemResults = fuse.search(searchQuery);
    const locResults = fuseLoc.search(searchQuery);

    // Build set of container IDs that have matching items
    const matchMap = new Map(); // containerId -> Set of item indices
    itemResults.forEach(r => {
      if (!matchMap.has(r.item.containerId)) {
        matchMap.set(r.item.containerId, new Set());
      }
      matchMap.get(r.item.containerId).add(r.item.itemIndex);
    });

    // Add containers matched by location/type
    locResults.forEach(r => {
      if (!matchMap.has(r.item.id)) {
        matchMap.set(r.item.id, new Set());
      }
    });

    return matchMap;
  }, [searchQuery, fuse, fuseLoc]);

  // Filtered containers
  const filteredContainers = useMemo(() => {
    let result = containers;
    if (locationFilter) {
      result = result.filter(c => c.location === locationFilter);
    }
    if (searchResults) {
      result = result.filter(c => searchResults.has(c.id));
    }
    return result;
  }, [containers, locationFilter, searchResults]);

  // Get unique locations in use
  const usedLocations = useMemo(() => {
    const locs = new Set(containers.map(c => c.location));
    return LOCATIONS.filter(l => locs.has(l));
  }, [containers]);

  // Toggle expand
  const toggleExpand = (id) => {
    setExpandedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  // ── Rendering ──

  if (authLoading) {
    return <div className="loading"><div className="spinner"></div>Loading...</div>;
  }

  if (needsSetup) {
    return <SetupScreen />;
  }

  if (!user) {
    return (
      <div className="login-screen">
        <h1>Bo Organize</h1>
        <p>Keep your stuff findable</p>
        <button className="login-btn" onClick={signIn}>
          <GoogleIcon /> Sign in with Google
        </button>
        {authError && <div className="login-error">{authError}</div>}
      </div>
    );
  }

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <h1>Bo Organize</h1>
        </div>
        <div className="header-right">
          {containers.length === 0 && (
            <button className="action-btn" onClick={seedData} style={{fontSize:'0.75rem'}}>
              Load starter data
            </button>
          )}
          <img className="user-avatar" src={user.photoURL} alt="" referrerPolicy="no-referrer" />
          <button className="sign-out-btn" onClick={signOut}>Sign out</button>
        </div>
      </div>

      {/* Search */}
      <div className="search-bar">
        <div className="search-input-wrap">
          <SearchIcon />
          <input
            className="search-input"
            placeholder="Search items, locations..."
            value={searchQuery}
            onChange={e => setSearchQuery(e.target.value)}
          />
          {searchQuery && (
            <button className="search-clear" onClick={() => setSearchQuery("")}>&times;</button>
          )}
        </div>
      </div>

      {/* Location filter pills */}
      {usedLocations.length > 1 && (
        <div className="filter-bar">
          <button
            className={`filter-pill ${!locationFilter ? 'active' : ''}`}
            onClick={() => setLocationFilter("")}
          >All</button>
          {usedLocations.map(loc => (
            <button
              key={loc}
              className={`filter-pill ${locationFilter === loc ? 'active' : ''}`}
              onClick={() => setLocationFilter(locationFilter === loc ? "" : loc)}
            >{loc}</button>
          ))}
        </div>
      )}

      {/* Main content */}
      <div className="main">
        {dataLoading ? (
          <div className="loading" style={{minHeight: '200px'}}><div className="spinner"></div>Loading...</div>
        ) : filteredContainers.length === 0 ? (
          <div className="empty-state">
            <BoxIcon />
            <p>{searchQuery ? "No matches found" : "No containers yet. Tap + to add one!"}</p>
          </div>
        ) : (
          filteredContainers.map(c => (
            <ContainerCard
              key={c.id}
              container={c}
              matchedItems={searchResults ? searchResults.get(c.id) : null}
              onAddItem={(item) => addItemToContainer(c.id, item)}
              onRemoveItem={(idx) => removeItemFromContainer(c.id, idx)}
              onMoveItem={(item) => setMoveItem({ item, fromContainerId: c.id })}
              onCopyLabel={() => copyLabel(c)}
              onEdit={() => setEditContainer(c)}
              onDelete={() => deleteContainer(c.id)}
            />
          ))
        )}
      </div>

      {/* FAB */}
      <button className="fab" onClick={() => setShowAddModal(true)}>
        <PlusIcon /> <span className="fab-label">New Container</span>
      </button>

      {/* Add/Edit Modal */}
      {(showAddModal || editContainer) && (
        <ContainerModal
          container={editContainer}
          onClose={() => { setShowAddModal(false); setEditContainer(null); }}
          onSave={async (data) => {
            if (editContainer) {
              await updateContainer(editContainer.id, data);
              showToast("Container updated");
            } else {
              await addContainer(data);
            }
            setShowAddModal(false);
            setEditContainer(null);
          }}
        />
      )}

      {/* Move modal */}
      {moveItem && (
        <MoveModal
          item={moveItem.item}
          fromContainerId={moveItem.fromContainerId}
          containers={containers}
          onMove={(toId) => moveItemToContainer(moveItem.item, moveItem.fromContainerId, toId)}
          onClose={() => setMoveItem(null)}
        />
      )}

      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ── Chip type class helper ──
function typeChipClass(type) {
  const slug = type.toLowerCase().replace(/\s+/g, '-');
  return `chip chip-type-${slug}`;
}

// ── Type emoji/icon helper ──
function typeEmoji(type) {
  switch(type) {
    case 'Box': return '📦';
    case 'Cloth Bin': return '🧺';
    case 'Vacuum Sealed Bag': return '🫧';
    case 'Uncontained': return '🗂';
    default: return '📋';
  }
}

// ── Container Card — always expanded tile ──
function ContainerCard({ container, matchedItems, onAddItem, onRemoveItem, onMoveItem, onCopyLabel, onEdit, onDelete }) {
  const [newItem, setNewItem] = useState("");
  const isHighlighted = matchedItems && matchedItems.size > 0;

  const handleAdd = () => {
    const trimmed = newItem.trim();
    if (!trimmed) return;
    onAddItem(trimmed);
    setNewItem("");
  };

  return (
    <div className={`container-card ${isHighlighted ? 'highlight' : ''}`}>
      <div className="container-header">
        {container.number != null && <div className="container-number">{container.number}</div>}
        <div className="container-meta">
          <div className="container-chips">
            <span className={typeChipClass(container.type)}>{typeEmoji(container.type)} {container.type}</span>
            <span className="chip chip-location">{container.location}</span>
            <span className="chip chip-count">{container.items.length} item{container.items.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        <div className="container-card-actions">
          <button className="icon-btn" title="Copy label" onClick={onCopyLabel}><CopyIcon /></button>
          <button className="icon-btn" title="Edit container" onClick={onEdit}><EditIcon /></button>
        </div>
      </div>

      <div className="container-body">
        {container.items.length > 0 && (
          <ul className="items-list">
            {container.items.map((item, idx) => (
              <li className="item-row" key={idx}>
                <span className={`item-text ${matchedItems && matchedItems.has(idx) ? 'matched' : ''}`}>{item}</span>
                <div className="item-actions">
                  <button className="icon-btn" title="Move" onClick={() => onMoveItem(item)}>
                    <MoveIcon />
                  </button>
                  <button className="icon-btn danger" title="Remove" onClick={() => onRemoveItem(idx)}>
                    <TrashIcon />
                  </button>
                </div>
              </li>
            ))}
          </ul>
        )}

        <div className="add-item-row">
          <input
            className="add-item-input"
            placeholder="Add item..."
            value={newItem}
            onChange={e => setNewItem(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleAdd()}
          />
          <button className="add-item-btn" onClick={handleAdd}>Add</button>
        </div>

        <div className="container-actions">
          <button className="action-btn" onClick={onCopyLabel}>
            <CopyIcon /> Copy Label
          </button>
          <button className="action-btn danger" onClick={onDelete}>
            <TrashIcon /> Delete
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Container Modal (Add/Edit) ──
function ContainerModal({ container, onClose, onSave }) {
  const [type, setType] = useState(container?.type || "Box");
  const [location, setLocation] = useState(container?.location || LOCATIONS[0]);
  const [customLocation, setCustomLocation] = useState("");
  const [useCustom, setUseCustom] = useState(false);
  const [items, setItems] = useState([]);
  const [newItem, setNewItem] = useState("");
  const itemInputRef = useRef(null);

  useEffect(() => {
    if (container && !LOCATIONS.includes(container.location)) {
      setUseCustom(true);
      setCustomLocation(container.location);
    }
  }, [container]);

  const handleAddItem = () => {
    const trimmed = newItem.trim();
    if (!trimmed) return;
    setItems(prev => [...prev, trimmed]);
    setNewItem("");
    setTimeout(() => itemInputRef.current?.focus(), 50);
  };

  const handleRemoveItem = (idx) => {
    setItems(prev => prev.filter((_, i) => i !== idx));
  };

  const handleSave = () => {
    const loc = useCustom ? customLocation.trim() : location;
    if (!loc) return;
    onSave({ type, location: loc, items });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2>{container ? 'Edit Container' : 'New Container'}</h2>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">Container Type</label>
            <select className="form-select" value={type} onChange={e => setType(e.target.value)}>
              {CONTAINER_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Location</label>
            {!useCustom ? (
              <select className="form-select" value={location} onChange={e => setLocation(e.target.value)}>
                {LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
              </select>
            ) : (
              <input className="form-input" value={customLocation} onChange={e => setCustomLocation(e.target.value)} placeholder="Custom location..." />
            )}
            <button
              onClick={() => setUseCustom(!useCustom)}
              style={{
                background:'none', border:'none', color:'var(--primary)', fontSize:'0.8rem',
                cursor:'pointer', marginTop:'6px', fontWeight:500
              }}
            >
              {useCustom ? "Choose from list" : "Add custom location"}
            </button>
          </div>

          {/* Items section — only for new containers */}
          {!container && (
            <div className="form-group">
              <label className="form-label">Items</label>
              {items.length > 0 && (
                <ul style={{listStyle:'none', marginBottom:'8px'}}>
                  {items.map((item, idx) => (
                    <li key={idx} style={{
                      display:'flex', alignItems:'center', justifyContent:'space-between',
                      padding:'6px 10px', background:'var(--bg)', borderRadius:'8px',
                      marginBottom:'4px', fontSize:'0.85rem'
                    }}>
                      <span>{item}</span>
                      <button className="icon-btn danger" onClick={() => handleRemoveItem(idx)} style={{flexShrink:0}}>
                        <TrashIcon />
                      </button>
                    </li>
                  ))}
                </ul>
              )}
              <div style={{display:'flex', gap:'6px'}}>
                <input
                  ref={itemInputRef}
                  className="form-input"
                  style={{flex:1, marginBottom:0}}
                  placeholder="Add an item and press Enter..."
                  value={newItem}
                  onChange={e => setNewItem(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && (e.preventDefault(), handleAddItem())}
                />
                <button
                  type="button"
                  onClick={handleAddItem}
                  style={{
                    background:'var(--primary)', color:'white', border:'none',
                    padding:'10px 14px', borderRadius:'8px', fontWeight:600,
                    fontSize:'0.85rem', cursor:'pointer', whiteSpace:'nowrap'
                  }}
                >Add</button>
              </div>
              {items.length > 0 && (
                <div style={{fontSize:'0.75rem', color:'var(--text-light)', marginTop:'6px'}}>
                  {items.length} item{items.length !== 1 ? 's' : ''} added
                </div>
              )}
            </div>
          )}

          <button className="form-submit" onClick={handleSave}>
            {container ? 'Update' : `Create Container${items.length > 0 ? ` with ${items.length} item${items.length !== 1 ? 's' : ''}` : ''}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Move Modal ──
function MoveModal({ item, fromContainerId, containers, onMove, onClose }) {
  const targets = containers.filter(c => c.id !== fromContainerId);
  const [search, setSearch] = useState("");

  const filtered = useMemo(() => {
    if (!search.trim()) return targets;
    const f = new Fuse(targets, {
      keys: ["location", "type", "items"],
      threshold: 0.4,
      ignoreLocation: true
    });
    return f.search(search).map(r => r.item);
  }, [targets, search]);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2>Move "{item}"</h2>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <input
              className="form-input"
              placeholder="Search containers..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
          </div>
          <ul className="move-target-list">
            {filtered.map(c => (
              <li key={c.id} className="move-target-item" onClick={() => onMove(c.id)}>
                <div className="move-target-number">{c.number}</div>
                <div className="move-target-info">
                  <div className="move-target-loc">{c.location}</div>
                  <div className="move-target-type">{c.type}</div>
                  <div className="move-target-items">
                    {c.items.length > 0 ? c.items.join(", ") : "(empty)"}
                  </div>
                </div>
              </li>
            ))}
            {filtered.length === 0 && (
              <div style={{padding:'20px', textAlign:'center', color:'var(--text-light)', fontSize:'0.9rem'}}>
                No containers found
              </div>
            )}
          </ul>
        </div>
      </div>
    </div>
