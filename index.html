<style>

    --primary-dark: #3730a3;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

    background: var(--bg);
    color: var(--text);

  }
  #root { min-height: 100vh; }

  /* Login screen */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

  .login-screen h1 {
    font-size: 2.5rem;
    color: white;
    margin-bottom: 8px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .login-screen p {
    color: rgba(255,255,255,0.8);
    margin-bottom: 32px;
    font-size: 1.1rem;
  }
  .login-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    color: var(--text);
    border: none;
    padding: 14px 32px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
  .login-btn svg { width: 20px; height: 20px; }
  .login-error {
    color: #fecaca;
    margin-top: 16px;
    font-size: 0.9rem;
    text-align: center;
    max-width: 320px;
  }

  /* Header */
  .header {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
  }
  .sign-out-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-light);
    cursor: pointer;
  }
  .sign-out-btn:hover { background: var(--bg); }

  /* Search bar */
  .search-bar {
    padding: 12px 20px;
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .search-input-wrap {
    position: relative;
    max-width: 600px;
    margin: 0 auto;
  }
  .search-input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    width: 18px; height: 18px;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 42px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    background: var(--bg);
  }
  .search-input:focus { border-color: var(--primary-light); background: white; }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--border);
    border: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text-light);
  }

  /* Main content */
  .main {
    padding: 16px 20px 100px;
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    align-items: start;
  }

  /* Container card — always expanded tile */
  .container-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
    display: flex;
    flex-direction: column;
  }
  .container-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
  .container-card.highlight {
    border-color: var(--primary-light);
    box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
  }
  .container-header {
    padding: 14px 14px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .container-number {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .container-meta { flex: 1; min-width: 0; }
  .container-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 4px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }
  .chip svg { width: 11px; height: 11px; }
  /* Location chips — warm tones */
  .chip-location {
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fde68a;
  }
  /* Type chips — cool tones, each type gets its own color */
  .chip-type-box { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
  .chip-type-cloth-bin { background: #fce7f3; color: #9d174d; border: 1px solid #fbcfe8; }
  .chip-type-vacuum-sealed-bag { background: #ede9fe; color: #5b21b6; border: 1px solid #ddd6fe; }
  .chip-type-uncontained { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .chip-type-other { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
  .chip-count {
    background: #f1f5f9;
    color: var(--text-light);
    border: 1px solid var(--border);
  }
  .container-card-actions {
    display: flex;
    gap: 2px;
    margin-left: auto;
    flex-shrink: 0;
  }

  /* Container body — always visible */
  .container-body { padding: 0 14px 12px; flex: 1; display: flex; flex-direction: column; }
  .items-list { list-style: none; flex: 1; }
  .item-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 0;
    border-bottom: 1px solid #f1f5f9;
    font-size: 0.82rem;
    line-height: 1.3;
  }
  .item-row:last-child { border-bottom: none; }
  .item-text { flex: 1; }
  .item-text.matched {
    background: linear-gradient(to right, rgba(251, 191, 36, 0.25), transparent);
    border-radius: 4px;
    padding: 2px 5px;
    margin: -2px -5px;
  }
  .item-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .item-row:hover .item-actions { opacity: 1; }
  @media (hover: none) { .item-actions { opacity: 1; } }
  .icon-btn {
    background: none;
    border: none;
    padding: 3px;
    cursor: pointer;
    color: var(--text-light);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { background: #fef2f2; color: var(--danger); }
  .icon-btn svg { width: 14px; height: 14px; }

  /* Add item row */
  .add-item-row {
    display: flex;
    gap: 6px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: 6px;
  }
  .add-item-input {
    flex: 1;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.8rem;
    outline: none;
    min-width: 0;
  }
  .add-item-input:focus { border-color: var(--primary-light); }
  .add-item-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-item-btn:hover { background: var(--primary-dark); }

  /* Container footer actions */
  .container-actions {
    display: flex;
    gap: 4px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .action-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 5px 8px;
    border-radius: 8px;
    font-size: 0.72rem;
    color: var(--text-light);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s, color 0.15s;
  }
  .action-btn:hover { background: var(--border); color: var(--text); }
  .action-btn.danger { color: var(--danger); }
  .action-btn.danger:hover { background: #fef2f2; }
  .action-btn svg { width: 12px; height: 12px; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    height: 56px;
    padding: 0 22px;
    border-radius: 16px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 50;
    letter-spacing: 0.2px;
  }
  .fab:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(79, 70, 229, 0.5); }
  .fab svg { width: 22px; height: 22px; }
  .fab-label { display: inline; }
  @media (max-width: 480px) {
    .fab { padding: 0; width: 56px; }
    .fab-label { display: none; }
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
    animation: fadeIn 0.15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 18px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-size: 1.15rem; font-weight: 700; }
  .modal-close {
    background: var(--bg);
    border: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-light);
  }
  .modal-body { padding: 16px 20px 20px; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    background: white;
    -webkit-appearance: none;

    background-position: right 12px center;
    padding-right: 32px;

    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;

    margin-bottom: 6px;

  .move-target-number {

    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.8rem;

  .move-target-info { flex: 1; min-width: 0; }
  .move-target-loc { font-size: 0.85rem; font-weight: 600; }
  .move-target-type { font-size: 0.7rem; color: var(--text-light); }
  .move-target-items {
    font-size: 0.7rem;
    color: var(--text-light);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Filter pills */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 8px 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .filter-pill {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    background: white;
    color: var(--text-light);
    transition: all 0.15s;
  }
  .filter-pill:hover { border-color: var(--primary-light); }
  .filter-pill.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
    grid-column: 1 / -1;
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 0.95rem; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-size: 1.1rem;
    color: var(--text-light);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 300;
    animation: toastIn 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }

  /* Setup screen */
  .setup-screen {
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .setup-screen h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .setup-screen p {
    color: var(--text-light);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .setup-code {
    background: #1e293b;
    color: #e2e8f0;
    padding: 16px;
    border-radius: 10px;
    font-family: 'SF Mono', monospace;
    font-size: 0.8rem;
    overflow-x: auto;
    margin-bottom: 16px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Responsive */
  @media (max-width: 720px) {
    .main {
      grid-template-columns: 1fr;
      padding: 12px 12px 100px;
    }
  }
  @media (min-width: 1100px) {
    .main { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 480px) {
    .header h1 { font-size: 1.1rem; }
    .container-header { padding: 12px 12px 8px; }
    .container-body { padding: 0 12px 10px; }
    .fab { bottom: 16px; right: 16px; }
    .filter-bar { padding: 8px 12px; }
  }
</style>

// ── App ──
function App() {
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [authError, setAuthError] = useState("");
  const [firebaseReady, setFirebaseReady] = useState(false);
  const [needsSetup, setNeedsSetup] = useState(false);

  // Data
  const [containers, setContainers] = useState([]);
  const [dataLoading, setDataLoading] = useState(true);

  // UI
  const [searchQuery, setSearchQuery] = useState("");
  const [locationFilter, setLocationFilter] = useState("");
  const [expandedIds, setExpandedIds] = useState(new Set());
  const [toast, setToast] = useState(null);

  // Modals
  const [showAddModal, setShowAddModal] = useState(false);
  const [editContainer, setEditContainer] = useState(null);
  const [moveItem, setMoveItem] = useState(null); // { item, fromContainerId }

  const dbRef = useRef(null);
  const unsubRef = useRef(null);

  // Initialize Firebase
  useEffect(() => {
    if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") {
      setNeedsSetup(true);
      setAuthLoading(false);
      return;
    }
    try {
      const app = firebase.initializeApp(FIREBASE_CONFIG);
      dbRef.current = firebase.firestore();
      setFirebaseReady(true);

      const unsubAuth = firebase.auth().onAuthStateChanged((u) => {
        if (u && ALLOWED_EMAILS.includes(u.email)) {
          setUser(u);
          setAuthError("");
        } else if (u) {
          firebase.auth().signOut();
          setAuthError("Access restricted. Only authorized accounts may sign in.");
          setUser(null);
        } else {
          setUser(null);
        }
        setAuthLoading(false);
      });
      return () => unsubAuth();
    } catch (e) {
      console.error("Firebase init error:", e);
      setNeedsSetup(true);
      setAuthLoading(false);
    }
  }, []);

  // Subscribe to Firestore
  useEffect(() => {
    if (!firebaseReady || !user) return;
    setDataLoading(true);
    const db = dbRef.current;
    const unsub = db.collection("containers").orderBy("number", "asc").onSnapshot((snap) => {
      const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setContainers(data);
      setDataLoading(false);
    }, (err) => {
      console.error("Firestore error:", err);
      setDataLoading(false);
    });
    unsubRef.current = unsub;
    return () => unsub();
  }, [firebaseReady, user]);

  // Show toast
  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }, []);

  // Sign in
  const signIn = async () => {
    setAuthError("");
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await firebase.auth().signInWithPopup(provider);
    } catch (e) {
      if (e.code !== "auth/popup-closed-by-user") {
        setAuthError(e.message);
      }
    }
  };

  // Sign out
  const signOut = () => firebase.auth().signOut();

  // ── CRUD operations ──
  const getNextNumber = () => {
    if (containers.length === 0) return 1;
    return Math.max(...containers.map(c => c.number)) + 1;
  };

  const addContainer = async (data) => {
    const db = dbRef.current;
    await db.collection("containers").add({
      number: getNextNumber(),
      type: data.type,
      location: data.location,
      items: data.items || [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast("Container added");
  };

  const updateContainer = async (id, data) => {
    const db = dbRef.current;
    await db.collection("containers").doc(id).update({
      ...data,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  };

  const deleteContainer = async (id) => {
    if (!window.confirm("Delete this container and all its items?")) return;
    const db = dbRef.current;
    await db.collection("containers").doc(id).delete();
    showToast("Container deleted");
  };

  const addItemToContainer = async (containerId, item) => {
    const container = containers.find(c => c.id === containerId);
    if (!container) return;
    const newItems = [...container.items, item];
    await updateContainer(containerId, { items: newItems });
    showToast("Item added");
  };

  const removeItemFromContainer = async (containerId, itemIndex) => {
    const container = containers.find(c => c.id === containerId);
    if (!container) return;
    const newItems = container.items.filter((_, i) => i !== itemIndex);
    await updateContainer(containerId, { items: newItems });
    showToast("Item removed");
  };

  const moveItemToContainer = async (item, fromContainerId, toContainerId) => {
    const from = containers.find(c => c.id === fromContainerId);
    const to = containers.find(c => c.id === toContainerId);
    if (!from || !to) return;

    const fromItems = from.items.filter(i => i !== item);
    const toItems = [...to.items, item];

    const db = dbRef.current;
    const batch = db.batch();
    batch.update(db.collection("containers").doc(fromContainerId), {
      items: fromItems,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    batch.update(db.collection("containers").doc(toContainerId), {
      items: toItems,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await batch.commit();
    showToast(`Moved to #${to.number}`);
    setMoveItem(null);
  };

  const copyLabel = (container) => {
    const lines = [`#${container.number}`, container.type, container.location, "", ...container.items];
    navigator.clipboard.writeText(lines.join("\n"));
    showToast("Label copied to clipboard");
  };

  // Seed data
  const seedData = async () => {
    const db = dbRef.current;
    const batch = db.batch();
    SEED_DATA.forEach((c) => {
      const ref = db.collection("containers").doc();
      batch.set(ref, {
        ...c,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
    showToast("Loaded outdoor storage data");
  };

  // ── Fuzzy search ──
  const allItemsForSearch = useMemo(() => {
    return containers.flatMap(c =>
      c.items.map((item, idx) => ({
        item,
        itemIndex: idx,
        containerId: c.id,
        containerNumber: c.number,
        containerLocation: c.location,
        containerType: c.type
      }))
    );
  }, [containers]);

  const fuse = useMemo(() => {
    return new Fuse(allItemsForSearch, {
      keys: ["item"],
      threshold: 0.35,
      ignoreLocation: true,
      minMatchCharLength: 2
    });
  }, [allItemsForSearch]);

  const fuseLoc = useMemo(() => {
    return new Fuse(containers, {
      keys: ["location", "type"],
      threshold: 0.35,
      ignoreLocation: true,
      minMatchCharLength: 2
    });
  }, [containers]);

  const searchResults = useMemo(() => {
    if (!searchQuery.trim()) return null;
    const itemResults = fuse.search(searchQuery);
    const locResults = fuseLoc.search(searchQuery);

    // Build set of container IDs that have matching items
    const matchMap = new Map(); // containerId -> Set of item indices
    itemResults.forEach(r => {
      if (!matchMap.has(r.item.containerId)) {
        matchMap.set(r.item.containerId, new Set());
      }
      matchMap.get(r.item.containerId).add(r.item.itemIndex);
    });

    // Add containers matched by location/type
    locResults.forEach(r => {
      if (!matchMap.has(r.item.id)) {
        matchMap.set(r.item.id, new Set());
      }
    });

    return matchMap;
  }, [searchQuery, fuse, fuseLoc]);

  // Filtered containers
  const filteredContainers = useMemo(() => {
    let result = containers;
    if (locationFilter) {
      result = result.filter(c => c.location === locationFilter);
    }
    if (searchResults) {
      result = result.filter(c => searchResults.has(c.id));
    }
    return result;
  }, [containers, locationFilter, searchResults]);

  // Get unique locations in use
  const usedLocations = useMemo(() => {
    const locs = new Set(containers.map(c => c.location));
    return LOCATIONS.filter(l => locs.has(l));
  }, [containers]);

  // Toggle expand
  const toggleExpand = (id) => {
    setExpandedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  // ── Rendering ──

  if (authLoading) {
    return <div className="loading"><div className="spinner"></div>Loading...</div>;
  }

  if (needsSetup) {
    return <SetupScreen />;
  }

  if (!user) {
    return (
      <div className="login-screen">
        <h1>Bo Organize</h1>
        <p>Keep your stuff findable</p>
        <button className="login-btn" onClick={signIn}>
          <GoogleIcon /> Sign in with Google
        </button>
        {authError && <div className="login-error">{authError}</div>}
      </div>
    );
  }

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <h1>Bo Organize</h1>
        </div>
        <div className="header-right">
          {containers.length === 0 && (
            <button className="action-btn" onClick={seedData} style={{fontSize:'0.75rem'}}>
              Load starter data
            </button>
          )}
          <img className="user-avatar" src={user.photoURL} alt="" referrerPolicy="no-referrer" />
          <button className="sign-out-btn" onClick={signOut}>Sign out</button>
        </div>
      </div>

      {/* Search */}
      <div className="search-bar">
        <div className="search-input-wrap">
          <SearchIcon />
          <input
            className="search-input"
            placeholder="Search items, locations..."
            value={searchQuery}
            onChange={e => setSearchQuery(e.target.value)}
          />
          {searchQuery && (
            <button className="search-clear" onClick={() => setSearchQuery("")}>&times;</button>
          )}
        </div>
      </div>

      {/* Location filter pills */}
      {usedLocations.length > 1 && (
        <div className="filter-bar">
          <button
            className={`filter-pill ${!locationFilter ? 'active' : ''}`}
            onClick={() => setLocationFilter("")}
          >All</button>
          {usedLocations.map(loc => (
            <button
              key={loc}
              className={`filter-pill ${locationFilter === loc ? 'active' : ''}`}
              onClick={() => setLocationFilter(locationFilter === loc ? "" : loc)}
            >{loc}</button>
          ))}
        </div>
      )}

      {/* Main content */}
      <div className="main">
        {dataLoading ? (
          <div className="loading" style={{minHeight: '200px'}}><div className="spinner"></div>Loading...</div>
        ) : filteredContainers.length === 0 ? (
          <div className="empty-state">
            <BoxIcon />
            <p>{searchQuery ? "No matches found" : "No containers yet. Tap + to add one!"}</p>
          </div>
        ) : (
          filteredContainers.map(c => (
            <ContainerCard
              key={c.id}
              container={c}
              matchedItems={searchResults ? searchResults.get(c.id) : null}
              onAddItem={(item) => addItemToContainer(c.id, item)}
              onRemoveItem={(idx) => removeItemFromContainer(c.id, idx)}
              onMoveItem={(item) => setMoveItem({ item, fromContainerId: c.id })}
              onCopyLabel={() => copyLabel(c)}
              onEdit={() => setEditContainer(c)}
              onDelete={() => deleteContainer(c.id)}
            />
          ))
        )}
      </div>

      {/* FAB */}
      <button className="fab" onClick={() => setShowAddModal(true)}>
        <PlusIcon /> <span className="fab-label">New Container</span>
      </button>

      {/* Add/Edit Modal */}
      {(showAddModal || editContainer) && (
        <ContainerModal
          container={editContainer}
          onClose={() => { setShowAddModal(false); setEditContainer(null); }}
          onSave={async (data) => {
            if (editContainer) {
              await updateContainer(editContainer.id, data);
              showToast("Container updated");
            } else {
              await addContainer(data);
            }
            setShowAddModal(false);
            setEditContainer(null);
          }}
        />
      )}

      {/* Move modal */}
      {moveItem && (
        <MoveModal
          item={moveItem.item}
          fromContainerId={moveItem.fromContainerId}
          containers={containers}
          onMove={(toId) => moveItemToContainer(moveItem.item, moveItem.fromContainerId, toId)}
          onClose={() => setMoveItem(null)}
        />
      )}

      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ── Chip type class helper ──
function typeChipClass(type) {
  const slug = type.toLowerCase().replace(/\s+/g, '-');
  return `chip chip-type-${slug}`;
}

// ── Type emoji/icon helper ──
function typeEmoji(type) {
  switch(type) {
    case 'Box': return '📦';
    case 'Cloth Bin': return '🧺';
    case 'Vacuum Sealed Bag': return '🫧';
    case 'Uncontained': return '🗂';
    default: return '📋';
  }
}

// ── Container Card — always expanded tile ──
function ContainerCard({ container, matchedItems, onAddItem, onRemoveItem, onMoveItem, onCopyLabel, onEdit, onDelete }) {
  const [newItem, setNewItem] = useState("");
  const isHighlighted = matchedItems && matchedItems.size > 0;

  const handleAdd = () => {
    const trimmed = newItem.trim();
    if (!trimmed) return;
    onAddItem(trimmed);
    setNewItem("");
  };

  return (
    <div className={`container-card ${isHighlighted ? 'highlight' : ''}`}>
      <div className="container-header">
        <div className="container-number">{container.number}</div>
        <div className="container-meta">
          <div className="container-chips">
            <span className={typeChipClass(container.type)}>{typeEmoji(container.type)} {container.type}</span>
            <span className="chip chip-location">{container.location}</span>
            <span className="chip chip-count">{container.items.length} item{container.items.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        <div className="container-card-actions">
          <button className="icon-btn" title="Copy label" onClick={onCopyLabel}><CopyIcon /></button>
          <button className="icon-btn" title="Edit container" onClick={onEdit}><EditIcon /></button>
        </div>
      </div>

      <div className="container-body">
        {container.items.length > 0 && (
          <ul className="items-list">
            {container.items.map((item, idx) => (
              <li className="item-row" key={idx}>
                <span className={`item-text ${matchedItems && matchedItems.has(idx) ? 'matched' : ''}`}>{item}</span>
                <div className="item-actions">
                  <button className="icon-btn" title="Move" onClick={() => onMoveItem(item)}>
                    <MoveIcon />
                  </button>
                  <button className="icon-btn danger" title="Remove" onClick={() => onRemoveItem(idx)}>
                    <TrashIcon />
                  </button>
                </div>
              </li>
            ))}
          </ul>
        )}

        <div className="add-item-row">
          <input
            className="add-item-input"
            placeholder="Add item..."
            value={newItem}
            onChange={e => setNewItem(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleAdd()}
          />
          <button className="add-item-btn" onClick={handleAdd}>Add</button>
        </div>

        <div className="container-actions">
          <button className="action-btn" onClick={onCopyLabel}>
            <CopyIcon /> Copy Label
          </button>
          <button className="action-btn danger" onClick={onDelete}>
            <TrashIcon /> Delete
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Container Modal (Add/Edit) ──
function ContainerModal({ container, onClose, onSave }) {
  const [type, setType] = useState(container?.type || "Box");
  const [location, setLocation] = useState(container?.location || LOCATIONS[0]);
  const [customLocation, setCustomLocation] = useState("");
  const [useCustom, setUseCustom] = useState(false);

  useEffect(() => {
    if (container && !LOCATIONS.includes(container.location)) {
      setUseCustom(true);
      setCustomLocation(container.location);
    }
  }, [container]);

  const handleSave = () => {
    const loc = useCustom ? customLocation.trim() : location;
    if (!loc) return;
    onSave({ type, location: loc });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2>{container ? 'Edit Container' : 'New Container'}</h2>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">Container Type</label>
            <select className="form-select" value={type} onChange={e => setType(e.target.value)}>
              {CONTAINER_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Location</label>
            {!useCustom ? (
              <select className="form-select" value={location} onChange={e => setLocation(e.target.value)}>
                {LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
              </select>
            ) : (
              <input className="form-input" value={customLocation} onChange={e => setCustomLocation(e.target.value)} placeholder="Custom location..." />
            )}
            <button
              onClick={() => setUseCustom(!useCustom)}
              style={{
                background:'none', border:'none', color:'var(--primary)', fontSize:'0.8rem',
                cursor:'pointer', marginTop:'6px', fontWeight:500
              }}
            >
              {useCustom ? "Choose from list" : "Add custom location"}
            </button>
          </div>
          <button className="form-submit" onClick={handleSave}>
            {container ? 'Update' : 'Create Container'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Move Modal ──
function MoveModal({ item, fromContainerId, containers, onMove, onClose }) {
  const targets = containers.filter(c => c.id !== fromContainerId);
  const [search, setSearch] = useState("");

  const filtered = useMemo(() => {
    if (!search.trim()) return targets;
    const f = new Fuse(targets, {
      keys: ["location", "type", "items"],
      threshold: 0.4,
      ignoreLocation: true
    });
    return f.search(search).map(r => r.item);
  }, [targets, search]);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2>Move "{item}"</h2>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <input
              className="form-input"
              placeholder="Search containers..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
          </div>
          <ul className="move-target-list">
            {filtered.map(c => (
              <li key={c.id} className="move-target-item" onClick={() => onMove(c.id)}>
                <div className="move-target-number">{c.number}</div>
                <div className="move-target-info">
                  <div className="move-target-loc">{c.location}</div>
                  <div className="move-target-type">{c.type}</div>
                  <div className="move-target-items">
                    {c.items.length > 0 ? c.items.join(", ") : "(empty)"}
                  </div>
                </div>
              </li>
            ))}
            {filtered.length === 0 && (
              <div style={{padding:'20px', textAlign:'center', color:'var(--text-light)', fontSize:'0.9rem'}}>
                No containers found
              </div>
            )}
          </ul>
        </div>
      </div>
    </div>
  );
}
